name: Build Worker Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: swim-worker-linux
          - os: windows-latest
            artifact: swim-worker-windows
          - os: macos-latest
            artifact: swim-worker-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: python scripts/build_exe.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/swim-worker*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Rename artifacts
        run: |
          mv swim-worker-linux/swim-worker swim-worker-linux/swim-worker-linux
          mv swim-worker-linux/swim-worker-gui swim-worker-linux/swim-worker-gui-linux || true
          mv swim-worker-macos/swim-worker swim-worker-macos/swim-worker-macos
          mv swim-worker-macos/swim-worker-gui swim-worker-macos/swim-worker-gui-macos || true
          mv swim-worker-windows/swim-worker.exe swim-worker-windows/swim-worker-windows.exe
          mv swim-worker-windows/swim-worker-gui.exe swim-worker-windows/swim-worker-gui-windows.exe || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            swim-worker-linux/swim-worker-linux
            swim-worker-linux/swim-worker-gui-linux
            swim-worker-macos/swim-worker-macos
            swim-worker-macos/swim-worker-gui-macos
            swim-worker-windows/swim-worker-windows.exe
            swim-worker-windows/swim-worker-gui-windows.exe
          generate_release_notes: true
