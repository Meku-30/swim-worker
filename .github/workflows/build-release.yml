name: Build Worker Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          # Linux は glibc 互換性のため古い runner (22.04, glibc 2.35) でビルド。
          # Pi OS Bookworm (glibc 2.36), Debian 12, Ubuntu 22.04+ で動作させるため。
          - os: ubuntu-22.04
            artifact: swim-worker-linux-amd64
          - os: ubuntu-22.04-arm
            artifact: swim-worker-linux-arm64
          - os: windows-latest
            artifact: swim-worker-windows
          - os: macos-latest
            artifact: swim-worker-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Install tkinter (macOS)
        if: runner.os == 'macOS'
        run: brew install python-tk@3.11

      - name: Build executable
        run: python scripts/build_exe.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/swim-worker*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/swim-worker-linux-amd64/swim-worker release/swim-worker-linux-amd64 || true
          cp artifacts/swim-worker-linux-arm64/swim-worker release/swim-worker-linux-arm64 || true
          # 後方互換: 既存 README 手順で swim-worker-linux (=amd64) をDLしているユーザー向け
          cp artifacts/swim-worker-linux-amd64/swim-worker release/swim-worker-linux || true
          cp artifacts/swim-worker-macos/swim-worker release/swim-worker-macos || true
          cp artifacts/swim-worker-windows/swim-worker-gui.exe release/swim-worker-windows.exe || true
          cp .env.example release/
          cp scripts/install.sh release/install.sh
          cp scripts/swim-worker.service release/swim-worker.service
          chmod +x release/install.sh
          ls -la release/

      - name: Generate SHA256SUMS
        run: |
          cd release
          sha256sum * > SHA256SUMS
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
          generate_release_notes: true
